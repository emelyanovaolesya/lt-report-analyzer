services:
  app:
    build: .
    container_name: lt-report-app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: host.docker.internal
      GRAFANA_URL: http://grafana:3000
      GRAFANA_PUBLIC_URL: http://localhost:3000
      INFLUXDB_URL: http://influxdb:8086
      PROMETHEUS_URL: http://prometheus:9090
    ports:
      - "8000:8000"
    depends_on:
      grafana:
        condition: service_started
      influxdb:
        condition: service_started
      prometheus:
        condition: service_started
    volumes:
      - ./:/app
      - reports_data:/app/generated_reports

  grafana:
    image: grafana/grafana:11.5.2
    container_name: lt-report-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      GF_RENDERING_RENDERER_TOKEN: ${GRAFANA_RENDERER_TOKEN:-lt-report-renderer-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-lt-report}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-lt-metrics}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-lt-report-token}
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
      - prometheus
      - renderer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: lt-report-grafana-renderer
    environment:
      ENABLE_METRICS: "true"
      HTTP_PORT: 8081
      AUTH_TOKEN: ${GRAFANA_RENDERER_TOKEN:-lt-report-renderer-token}

  influxdb:
    image: influxdb:2.7
    container_name: lt-report-influxdb
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-admin12345}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-lt-report}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-lt-metrics}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-lt-report-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: lt-report-prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./mock_metrics:/mock_metrics
      - prometheus_data:/prometheus

volumes:
  grafana_data:
  reports_data:
  influxdb_data:
  influxdb_config:
  prometheus_data:
