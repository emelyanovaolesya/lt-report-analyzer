<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}LT Report Analyzer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='/css/app.css') }}" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div>
                <div class="brand-mark">LT</div>
                <h1 class="brand-title">Report Analyzer</h1>
                <p class="brand-subtitle">Анализ результатов нагрузочного тестирования</p>
            </div>

            <nav class="nav flex-column gap-2 mt-4">
                <a class="nav-link" href="/">Главная</a>
                <a class="nav-link" href="/projects">Проекты</a>
                <a class="nav-link" href="/profiles">Профили НТ</a>
                <a class="nav-link" href="/tests">Тесты</a>
                <a class="nav-link" href="/reports">Отчеты</a>
                {% if user.role == "ADMIN" %}
                <a class="nav-link" href="/report-templates">Шаблоны</a>
                <a class="nav-link" href="/users">Пользователи</a>
                {% endif %}
            </nav>

            <div class="sidebar-footer">
                <div class="small text-secondary">{{ user.login }}</div>
                <div class="badge text-bg-light">{{ user.role }}</div>
                <form action="/logout" method="post" class="mt-3">
                    <button class="btn btn-sm btn-outline-light w-100">Выйти</button>
                </form>
            </div>
        </aside>

        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
