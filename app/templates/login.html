<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход | LT Report Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='/css/app.css') }}" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-card card shadow-lg border-0">
        <div class="card-body p-4 p-md-5">
            <div class="mb-4">
                <div class="eyebrow">Дипломный проект</div>
                <h1 class="h3 mb-2">LT Report Analyzer</h1>
                <p class="text-secondary mb-0">Веб-приложение для анализа результатов нагрузочного тестирования</p>
            </div>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login" class="d-grid gap-3">
                <div>
                    <label class="form-label">Логин</label>
                    <input class="form-control" name="login" required>
                </div>
                <div>
                    <label class="form-label">Пароль</label>
                    <input class="form-control" name="password" type="password" required>
                </div>
                <button class="btn btn-primary btn-lg">Войти</button>
            </form>
        </div>
    </div>
</body>
</html>
